services:
  - type: web
    name: subpricing
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.runOnSave false --server.fileWatcherType none
    routes:
      - type: rewrite
        source: /sitemap.xml
        destination: https://chiarlaC.github.io/geo-arbitrage-mrr/sitemap.xml
      - type: rewrite
        source: /robots.txt
        destination: https://chiarlaC.github.io/geo-arbitrage-mrr/robots.txt
