name: Update Subscription Data

on:
  schedule:
    # Run daily at 02:00 UTC (10:00 Beijing time)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run data update script
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data.json

          if git diff --staged --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "chore: update subscription pricing data [skip ci]

Automated update from GitHub Actions
- Fetched live exchange rates
- Updated USD conversions
- Recalculated savings percentages"
            git push
          fi

      - name: Summary
        run: |
          echo "✅ Data update completed successfully"
          echo "📊 Check public/data.json for latest prices"
