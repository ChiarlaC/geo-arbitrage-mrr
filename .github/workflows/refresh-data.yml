name: Refresh pricing data

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00 运行（北京时间 10:00）
  workflow_dispatch:        # 允许手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for rebase

      - name: Sync to latest main before running pipeline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4

      - name: Run data pipeline
        run: python data_engine.py

      - name: Commit updated data.csv
        run: |
          git add data.csv
          if git diff --staged --quiet; then
            echo "data.csv unchanged — nothing to commit"
          else
            git commit -m "chore: refresh pricing data [skip ci]"
            git push origin HEAD:main
          fi
