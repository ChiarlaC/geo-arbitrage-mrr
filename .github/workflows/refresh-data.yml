name: Refresh pricing data

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00 运行（北京时间 10:00）
  workflow_dispatch:        # 允许手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4

      - name: Run data pipeline
        run: python data_engine.py

      - name: Commit updated data.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git stash
          git pull --rebase origin main
          git stash pop
          git diff --staged --quiet || git commit -m "chore: refresh pricing data [skip ci]"
          git push
